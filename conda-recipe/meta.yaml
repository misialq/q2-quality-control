package:
  name: q2-quality-control
  version: {{ PLUGIN_VERSION }}
source:
  path: ..
build:
  script: make install
requirements:
  host:
  - python {{ python }}
  - pip
  - setuptools
  - versioningit
  - wheel
  run:
  - python {{ python }}
  - pandas {{ pandas }}
  - seaborn
  - blast {{ blast }}
  - bioconductor-decontam
  - r-base {{ r_base }}
  - r-optparse {{ r_optparse }}
  - vsearch {{ vsearch }}
  - samtools {{ samtools }}
  - bowtie2
  - gfatools
  - seqtk
  - qiime2 >={{ qiime2 }}
  - q2-types >={{ q2_types }}
  - q2templates >={{ q2templates }}
  - q2-taxa >={{ q2_taxa }}
  - q2-feature-table >={{ q2_feature_table }}
  - biom-format {{ biom_format }}
  build:
  - python {{ python }}
  - setuptools
  - versioningit
test:
  commands:
  - py.test --pyargs q2_quality_control
  requires:
  - qiime2 >={{ qiime2 }}
  - q2-types >={{ q2_types }}
  - q2templates >={{ q2templates }}
  - q2-taxa >={{ q2_taxa }}
  - pytest
  imports:
  - q2_quality_control
  - qiime2.plugins.quality_control
about:
  home: https://qiime2.org
  license: BSD-3-Clause
  license_family: BSD
